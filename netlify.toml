[build]
  command = "npm run build"
  publish = "_site"

[[redirects]]
  from = "/campaigns"
  to = "/campaigns/"
  status = 301

[[redirects]]
  from = "/framework"
  to = "/framework/"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
